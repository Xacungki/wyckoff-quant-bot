name: Daily Quant Scanner

on:
  schedule:
    # Chạy tự động vào 5h00 sáng giờ Việt Nam mỗi ngày (tương đương 22h00 UTC hôm trước)
    - cron: '0 22 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện (Dependencies)
        run: pip install -r requirements.txt

      - name: Tái tạo chìa khóa Firebase từ Két sắt
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_JSON }}
        run: echo "$FIREBASE_SECRET" > firebase_key.json

      - name: Khởi động Lõi Quét
        run: python quant_core.py
